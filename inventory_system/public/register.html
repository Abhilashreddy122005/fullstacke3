<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Inventory System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }
    .register-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 28px;
      color: #222;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn-register {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 16px;
    }
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .error-msg {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: none;
      font-size: 13px;
    }
    .success-msg {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: none;
      font-size: 13px;
    }
    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #666;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="logo">📦</div>
      <h1>Create Account</h1>
      <p class="subtitle">Join the Inventory System</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="fullname">Full Name *</label>
        <input type="text" id="fullname" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="username">Username *</label>
        <input type="text" id="username" placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" placeholder="At least 6 characters" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password *</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role">
          <option value="user">User (Can view items)</option>
          <option value="manager">Manager (Can manage stock)</option>
        </select>
      </div>

      <button type="submit" class="btn-register">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="/login.html">Login here</a>
    </div>
  </div>

  <script>
    // redirect to login if not logged in or not admin
    (async function(){
      try {
        const res = await fetch('/api/user');
        if (!res.ok) return window.location.href = '/login.html';
        const data = await res.json();
        if (data.role !== 'admin') window.location.href = '/login.html';
      } catch(err){ window.location.href = '/login.html'; }
    })();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullname = document.getElementById('fullname').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const role = document.getElementById('role').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // Validation
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname, username, email, password, role })
        });
        const data = await res.json();
        
        if (res.ok) {
          successMsg.textContent = 'Account created! Redirecting to login...';
          successMsg.style.display = 'block';
          setTimeout(() => window.location.href = '/login.html', 2000);
        } else {
          errorMsg.textContent = data.error || 'Registration failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Is the server running?';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
