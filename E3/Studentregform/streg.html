
<!DOCTYPE html>
<html lang="en">
    <head>  
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Register Form</title>
        <link rel="stylesheet" href="stregister.css">

    </head>
    <body>
        <div class="container">
            <h2>Register Form</h2>
            <form id="registerform" >
                <label>Name:</label>
                <input type="text" id="Name" placeholder="Enter Name" required/><br><br>
                
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter Email" required><br><br>
                
                <label>DOB:</label>
                <input type="date" id="dob" placeholder="Enter your date of birth" required><br><br>
                
                <label>Department:</label>
                <input type="text" id="department" placeholder="Department" required><br><br>

                <label>Year:</label>
                <input type="text" id="year" placeholder="Year" required><br><br>

                <label>Phone:</label>
                <input type="tel" id="phone" placeholder="Phone Number" required ><br><br>
                


                <button type="button" onclick="Save()">SAVE</button>

                <p id="errorMsg"></p>
            </form>
        </div>

        <script src="Stscript.js"></script>
    </body>
</html>
